<style>
:root{--bg:#0f0e0d;--fg:#f0ece4;--muted:rgba(255,255,255,0.3);--dim:rgba(255,255,255,0.15);--card:rgba(255,255,255,0.025);--border:rgba(255,255,255,0.06);--accent:#E8927C}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'DM Sans','Helvetica Neue',sans-serif;max-width:740px;margin:0 auto;min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif}
nav{position:sticky;top:0;z-index:100;background:rgba(15,14,13,0.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 4px;-webkit-overflow-scrolling:touch}
nav button{padding:9px 9px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
nav button.active{color:var(--fg);font-weight:700;border-bottom-color:var(--accent)}
nav button:hover{color:var(--fg)}
.view{display:none;padding:0 14px 20px}.view.active{display:block}
.pick-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;gap:8px;align-items:flex-start;transition:background .15s}
.pick-card:hover{background:rgba(255,255,255,0.04)}
.pick-card .info{flex:1;min-width:0}
.pick-card .rank{color:var(--muted);font-size:9px;font-weight:700;font-family:monospace}
.pick-card .album-name{font-weight:700;color:var(--fg);font-size:12px}
.pick-card .artist-name{color:rgba(255,255,255,0.4);font-size:10px;margin-top:1px}
.pick-card .track{color:rgba(255,255,255,0.22);font-size:9px;margin-top:1px}
.pick-card .note{color:rgba(255,255,255,0.18);font-size:9px;margin-top:2px;font-style:italic}
.pick-card .meta{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.top5{font-size:7px;background:rgba(232,146,124,0.2);color:var(--accent);padding:1px 4px;border-radius:2px;font-weight:700;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:3px;border-radius:14px;padding:1px 7px;font-size:9px;font-weight:600;white-space:nowrap}
.badge .dot{width:4px;height:4px;border-radius:50%}
.cover{border-radius:4px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.05)}
.cover img{width:100%;height:100%;object-fit:cover;display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px}
.stat-box{background:var(--card);border-radius:7px;padding:10px 6px;text-align:center;border:1px solid rgba(255,255,255,0.04)}
.stat-box .val{font-size:20px;font-weight:800;font-family:monospace}
.stat-box .label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.consensus-row{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:6px;padding:6px 10px;border:1px solid rgba(255,255,255,0.04);margin-bottom:4px}
.consensus-row .c-info{flex:1;min-width:0}
.consensus-row .c-album{font-weight:700;font-size:11px}
.consensus-row .c-artist{color:rgba(255,255,255,0.35);font-size:10px}
.consensus-row .c-badges{display:flex;gap:2px;flex-wrap:wrap}
.artist-pill{background:var(--card);border-radius:12px;padding:3px 8px;border:1px solid rgba(255,255,255,0.05);font-size:10px;display:inline-block;margin:0 3px 4px 0}
.thread-row{display:flex;align-items:center;gap:8px;padding:5px 10px;background:rgba(255,255,255,0.015);border-radius:5px;margin-bottom:3px}
.thread-row .yr{font-weight:800;font-size:14px;font-family:monospace;width:36px}
.section-person{margin-bottom:20px}
.section-person .sp-head{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.section-person .sp-name{font-size:12px;font-weight:700}
.section-person .sp-count{font-size:10px;color:rgba(255,255,255,0.2)}
.picks-list{display:flex;flex-direction:column;gap:3px}
.section-title{font-size:13px;font-weight:700;margin-bottom:8px}
.section-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:6px}
.search-input{width:100%;padding:8px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:var(--fg);font-size:12px;outline:none;margin-bottom:10px;font-family:'DM Sans',sans-serif}
.nerd-bar{display:flex;align-items:center;gap:6px;padding:4px 0}
.nerd-bar .bar-bg{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden}
.nerd-bar .bar-fill{height:100%;border-radius:2px}
.nerd-bar .bar-label{font-size:9px;color:rgba(255,255,255,0.25);font-family:monospace;min-width:50px;text-align:right}
.overlap-table{border-collapse:collapse}
.overlap-table th{padding:2px;font-size:8px;font-weight:700;writing-mode:vertical-rl;height:40px}
.overlap-table td{padding:2px;text-align:center;font-size:10px;font-weight:700;font-family:monospace;border-radius:2px}
.overlap-table .row-label{font-size:9px;font-weight:600;padding:1px 4px;text-align:left}
.insight{padding:6px 8px;background:rgba(255,255,255,0.015);border-radius:5px;margin-bottom:3px}
.insight .i-title{font-size:11px;font-weight:700}
.insight .i-desc{font-size:10px;color:var(--muted);margin-top:1px}
.person-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.person-card{background:var(--card);border-radius:8px;padding:12px}
.artist-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;gap:8px;align-items:center}
.artist-card .a-name{font-weight:700;font-size:12px}
.artist-card .a-meta{font-size:9px;color:var(--muted)}
.footer{text-align:center;padding:20px 14px 28px;border-top:1px solid rgba(255,255,255,0.03);margin-top:20px;font-size:9px;color:rgba(255,255,255,0.12)}
</style>
</head>

// ═══ ALBUM ART — MusicBrainz + Cover Art Archive ═══
// Free, no API key, CORS-friendly from browsers
// Rate-limited queue (1 req per 1.2s for MusicBrainz)
// localStorage cache so covers only fetch once ever

const COVER_CACHE_PREFIX = 'mna_cover_';
const MB_USER_AGENT = 'MusicNerdsArchive/1.0 (taa121288@gmail.com)';

// --- localStorage cache layer ---
function cacheGet(artist, album) {
  try {
    const key = COVER_CACHE_PREFIX + (artist + '|||' + album).toLowerCase();
    return localStorage.getItem(key);
  } catch(e) { return null; }
}
function cacheSet(artist, album, url) {
  try {
    const key = COVER_CACHE_PREFIX + (artist + '|||' + album).toLowerCase();
    localStorage.setItem(key, url);
  } catch(e) {}
}

// --- Procedural SVG fallback ---
function makeCoverSvg(artist, album) {
  const h = (artist+album).split("").reduce((a,c) => a+c.charCodeAt(0), 0);
  const h1=h%360, h2=(h*7)%360;
  const initials = artist.split(/\s+/).map(w=>w[0]||'').slice(0,2).join('').toUpperCase();
  const pats = [
    `<rect width="100" height="100" fill="hsl(${h1},45%,32%)"/><circle cx="50" cy="50" r="30" fill="hsl(${h2},50%,50%)" opacity=".6"/><text x="50" y="56" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="22" font-family="sans-serif" font-weight="700">${initials}</text>`,
    `<rect width="100" height="100" fill="hsl(${h1},40%,25%)"/><rect x="10" y="10" width="80" height="80" rx="40" fill="hsl(${h2},45%,45%)"/><text x="50" y="56" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="22" font-family="sans-serif" font-weight="700">${initials}</text>`,
    `<rect width="50" height="50" fill="hsl(${h1},42%,34%)"/><rect x="50" y="50" width="50" height="50" fill="hsl(${h1},42%,34%)"/><rect x="50" width="50" height="50" fill="hsl(${h2},48%,48%)"/><rect y="50" width="50" height="50" fill="hsl(${h2},48%,48%)"/><text x="50" y="56" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="22" font-family="sans-serif" font-weight="700">${initials}</text>`,
    `<defs><linearGradient id="g${h%999}" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="hsl(${h1},45%,30%)"/><stop offset="100%" stop-color="hsl(${h2},50%,45%)"/></linearGradient></defs><rect width="100" height="100" fill="url(#g${h%999})"/><text x="50" y="56" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="22" font-family="sans-serif" font-weight="700">${initials}</text>`,
  ];
  return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${pats[h%4]}</svg>`;
}

// --- Rate-limited fetch queue for MusicBrainz ---
const fetchQueue = [];
let queueRunning = false;

function enqueueCoverFetch(artist, album, elements) {
  fetchQueue.push({ artist, album, elements });
  if (!queueRunning) processQueue();
}

async function processQueue() {
  queueRunning = true;
  const total = fetchQueue.length;
  let done = 0;
  const statusEl = document.getElementById('coverStatus');
  while (fetchQueue.length > 0) {
    const job = fetchQueue.shift();
    done++;
    if (statusEl) statusEl.textContent = `Loading album art ${done}/${total+done-1}... `;
    try {
      await fetchAndApplyCover(job.artist, job.album, job.elements);
    } catch(e) {}
    // Rate limit: 1.2s between MusicBrainz requests
    await new Promise(r => setTimeout(r, 1200));
  }
  if (statusEl) statusEl.textContent = '';
  queueRunning = false;
}

async function fetchAndApplyCover(artist, album, elements) {
  // Step 1: Search MusicBrainz for release-group MBID
  const query = encodeURIComponent(`releasegroup:"${album}" AND artist:"${artist}"`);
  const mbUrl = `https://musicbrainz.org/ws/2/release-group/?query=${query}&fmt=json&limit=3`;
  
  const mbResp = await fetch(mbUrl, {
    headers: { 'User-Agent': MB_USER_AGENT }
  });
  
  if (!mbResp.ok) {
    cacheSet(artist, album, 'NONE');
    return;
  }
  
  const mbData = await mbResp.json();
  const rgs = mbData['release-groups'] || [];
  
  if (rgs.length === 0) {
    cacheSet(artist, album, 'NONE');
    return;
  }
  
  // Find best match — prefer artist name match
  let bestRg = rgs[0];
  const artistLower = artist.toLowerCase();
  for (const rg of rgs) {
    const credits = rg['artist-credit'] || [];
    for (const credit of credits) {
      if (credit.name && credit.name.toLowerCase() === artistLower) {
        bestRg = rg;
        break;
      }
    }
  }
  
  const mbid = bestRg.id;
  
  // Step 2: Get cover art from Cover Art Archive
  const coverUrl = `https://coverartarchive.org/release-group/${mbid}/front-250`;
  
  // Test if image exists (CAA redirects to the actual image)
  try {
    const imgResp = await fetch(coverUrl, { method: 'HEAD' });
    if (imgResp.ok || imgResp.redirected) {
      // The URL works — cache and apply
      const finalUrl = imgResp.url || coverUrl;
      cacheSet(artist, album, finalUrl);
      applyImage(elements, finalUrl, artist, album);
      return;
    }
  } catch(e) {
    // HEAD failed, try loading directly — some CORS configs only allow GET
    cacheSet(artist, album, coverUrl);
    applyImage(elements, coverUrl, artist, album);
    return;
  }
  
  cacheSet(artist, album, 'NONE');
}

function applyImage(elements, url, artist, album) {
  const fallbackSvg = makeCoverSvg(artist, album).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  elements.forEach(el => {
    el.innerHTML = `<img src="${url}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.innerHTML='${fallbackSvg}'">`;
    el.dataset.loaded = 'true';
  });
}

// --- Main cover HTML generator ---
function makeCover(artist, album, size) {
  const cached = cacheGet(artist, album);
  if (cached && cached !== 'NONE') {
    // Cached image — render immediately
    return `<div class="cover" style="width:${size}px;height:${size}px;min-width:${size}px" data-loaded="true"><img src="${cached}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.innerHTML='${makeCoverSvg(artist,album).replace(/'/g,"\\'").replace(/"/g,'&quot;')}'"></div>`;
  }
  // No cache or NONE — show fallback, queue fetch if not NONE
  const fallback = makeCoverSvg(artist, album);
  return `<div class="cover" style="width:${size}px;height:${size}px;min-width:${size}px" data-artist="${artist.replace(/"/g,'&amp;quot;')}" data-album="${album.replace(/"/g,'&amp;quot;')}">${fallback}</div>`;
}

// --- Scan visible covers and queue fetches ---
function loadCovers() {
  const covers = document.querySelectorAll('.cover[data-artist]:not([data-loaded])');
  const unique = {};
  covers.forEach(c => {
    const artist = c.dataset.artist.replace(/&quot;/g, '"');
    const album = c.dataset.album.replace(/&quot;/g, '"');
    const key = artist + '|||' + album;
    
    // Check cache first
    const cached = cacheGet(artist, album);
    if (cached === 'NONE') {
      c.dataset.loaded = 'true'; // Don't retry
      return;
    }
    if (cached) {
      applyImage([c], cached, artist, album);
      return;
    }
    
    if (!unique[key]) unique[key] = { artist, album, elements: [] };
    unique[key].elements.push(c);
  });
  
  // Queue uncached fetches
  Object.values(unique).forEach(job => {
    enqueueCoverFetch(job.artist, job.album, job.elements);
  });
}

function makeBadge(pid) {
  const p = PEOPLE[pid]; if (!p) return '';
  return `<span class="badge" style="background:${p.color}18;border:1px solid ${p.color}40;color:${p.color}"><span class="dot" style="background:${p.color}"></span>${p.short}</span>`;
}

function makePickCard(pick, showPerson, showYear) {
  const rk = pick.r ? `<span class="rank">#${pick.r}</span> ` : '';
  const t5 = pick.f ? ' <span class="top5">TOP 5</span>' : '';
  const tr = pick.t ? `<div class="track">♪ ${pick.t}</div>` : '';
  const nt = pick.n ? `<div class="note">${pick.n.length>90?pick.n.slice(0,90)+'...':pick.n}</div>` : '';
  const pe = showPerson ? makeBadge(pick.p) : '';
  const yr = showYear ? `<span style="font-size:9px;color:rgba(255,255,255,0.2);font-family:monospace">${pick.y}</span>` : '';
  return `<div class="pick-card">${makeCover(pick.a, pick.l, 44)}<div class="info"><div>${rk}<span class="album-name">${pick.l}</span>${t5}</div><div class="artist-name">${pick.a}</div>${tr}${nt}<div class="meta">${pe}${yr}</div></div></div>`;
}

// ═══ ANALYTICS ═══
function computeAnalytics() {
  const ak = p => p.a+'|||'+p.l;
  const am = {}; PICKS.forEach(p => { const k=ak(p); if(!am[k]) am[k]={a:p.a,l:p.l,pp:new Set(),yy:new Set()}; am[k].pp.add(p.p); am[k].yy.add(p.y); });
  const con = Object.values(am).map(a=>({a:a.a,l:a.l,pp:[...a.pp],yy:[...a.yy],c:a.pp.size})).filter(a=>a.c>1).sort((a,b)=>b.c-a.c);
  const artMap = {}; PICKS.forEach(p => { if(!artMap[p.a]) artMap[p.a]={a:p.a,pp:new Set(),c:0,yy:new Set(),albums:new Set()}; artMap[p.a].pp.add(p.p); artMap[p.a].c++; artMap[p.a].yy.add(p.y); artMap[p.a].albums.add(p.l); });
  const ta = Object.values(artMap).map(a=>({...a,pp:[...a.pp],yy:[...a.yy],albums:[...a.albums]})).sort((a,b)=>b.c-a.c);
  const allPeople = [...new Set(PICKS.map(p=>p.p))];
  const stats = allPeople.map(pid=>({p:pid,t:PICKS.filter(x=>x.p===pid).length,yy:[...new Set(PICKS.filter(x=>x.p===pid).map(x=>x.y))].sort()})).sort((a,b)=>b.t-a.t);
  const ov = {}; allPeople.forEach(p1=>{ov[p1]={};const s1=new Set(PICKS.filter(x=>x.p===p1).map(ak));allPeople.forEach(p2=>{if(p1===p2){ov[p1][p2]=s1.size;return;}const s2=new Set(PICKS.filter(x=>x.p===p2).map(ak));let c=0;s1.forEach(a=>{if(s2.has(a))c++;});ov[p1][p2]=c;});});
  
  // Unique picks per person (albums only they picked)
  const uniquePicks = {};
  allPeople.forEach(pid => {
    const myAlbums = PICKS.filter(x=>x.p===pid).map(ak);
    const unique = myAlbums.filter(k => {
      const entry = am[k];
      return entry && entry.pp.size === 1;
    });
    uniquePicks[pid] = unique.length;
  });
  
  // Year-over-year participation
  const yearParticipation = {};
  [2020,2021,2022,2023,2024,2025].forEach(y => {
    yearParticipation[y] = [...new Set(PICKS.filter(p=>p.y===y).map(p=>p.p))].length;
  });
  
  return {con,ta,stats,ov,allPeople,uniquePicks,yearParticipation};
}
const AN = computeAnalytics();

  [{yr:2025,s:"Music Nerds - 2025",st:"✅ 4 lists"},{yr:2024,s:"Music Nerds - 2024",st:"✅ 5 lists"},{yr:2023,s:"Music Nerds - 2023",st:"✅ 5 lists"},{yr:2022,s:"End of Year 2022",st:"✅ 7 lists"},{yr:2021,s:"2021!",st:"✅ 7 lists"},{yr:2020,s:"Music Lists 2020",st:"✅ 6 lists"}].forEach(t => {

function renderYear(year) {

function renderArtists() {
  let html = `<h2 style="font-size:22px;font-weight:800;padding-top:12px;margin-bottom:4px">Artists</h2><p style="color:rgba(255,255,255,0.25);font-size:11px;margin-bottom:10px">${AN.ta.length} unique artists across 6 years</p>`;

  html += `<div id="artistList">`;

    html += `<div class="artist-card" style="margin-bottom:4px"><div style="flex:1"><div class="a-name">${art.a}</div><div class="a-meta">${art.c} pick${art.c>1?'s':''} · ${art.yy.join(', ')} · ${art.pp.map(pid=>makeBadge(pid)).join(' ')}</div><div style="font-size:9px;color:rgba(255,255,255,0.15);margin-top:2px">${art.albums.join(' · ')}</div></div></div>`;

function filterArtists() {
  const q = document.getElementById('artistSearchInput').value.toLowerCase();

  let html = '';
  filtered.slice(0,80).forEach(art => {
    html += `<div class="artist-card" style="margin-bottom:4px"><div style="flex:1"><div class="a-name">${art.a}</div><div class="a-meta">${art.c} pick${art.c>1?'s':''} · ${art.yy.join(', ')} · ${art.pp.map(pid=>makeBadge(pid)).join(' ')}</div><div style="font-size:9px;color:rgba(255,255,255,0.15);margin-top:2px">${art.albums.join(' · ')}</div></div></div>`;
  });
  document.getElementById('artistList').innerHTML = html;
}

function renderSearch() {
  return `<h2 style="font-size:22px;font-weight:800;padding-top:12px;margin-bottom:10px">Search</h2><input class="search-input" id="searchInput" placeholder="Search albums or artists..." oninput="doSearch()"><div id="searchResults" class="picks-list"></div>`;
}
function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const res = PICKS.filter(p=>!q||p.l.toLowerCase().includes(q)||p.a.toLowerCase().includes(q));
  document.getElementById('searchResults').innerHTML = res.slice(0,40).map(pk=>makePickCard(pk,true,true)).join('');
  setTimeout(loadCovers, 100);
}

  AN.allPeople.forEach(pid => { html += `<th style="color:${PEOPLE[pid].color}">${PEOPLE[pid].short}</th>`; });

    AN.allPeople.forEach(p2 => {

      html += `<td style="color:${color};background:${bg}">${v>0?v:'·'}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  
  // Genre tendencies
  html += `<h3 class="section-sub">Who Listens to What</h3>`;
  const tendencies = [
    {p:"taylor",d:"Indie rock, folk, jam bands, singer-songwriters. Big Thief/Bon Iver evangelist. Goose convert."},
    {p:"earl",d:"Alt-rock, indie, modern songwriters. Denver show scene encyclopedist. Nilufer Yanya + Wednesday champion."},
    {p:"huston",d:"Wildcard king. Country ↔ rap ↔ pop ↔ metal. Orville Peck, Beyonce, Bad Bunny, and King Gizzard in one list."},
    {p:"tyler",d:"Art rock, jazz, experimental. Pavement, Floating Points, Destroyer. The group's avant-garde wing."},
    {p:"brian",d:"Indie, R&B, electronic, Sufjan deep cuts. Most diverse taste year over year. Minneapolis scene reporter."},
    {p:"paul",d:"Krautrock, psych, Saharan rock, ambient folk. Nashville WXNA radio host. Most niche picks in the group."},
    {p:"clint",d:"Indie rock, singer-songwriter, Nashville adjacent. Phoebe Bridgers, Andy Shauf, Taylor Swift (guilty pleasure)."},
    {p:"danny",d:"Americana, country, blues, classic rock. The guy who introduced everyone to Sierra Ferrell."},
    {p:"robert",d:"Electronic, art pop, experimental. The newest nerd with the most forward-looking taste."},
  ];
  tendencies.forEach(t => {
    if (PEOPLE[t.p]) html += `<div class="insight"><div class="i-title">${PEOPLE[t.p].emoji} ${PEOPLE[t.p].name}</div><div class="i-desc">${t.d}</div></div>`;
  });
  
  // Key insights
  html += `<h3 class="section-sub" style="margin-top:16px">Key Insights (2020–2025)</h3>`;
  [
    {i:"🏆",t:"ALL-TIME RECORD: Alvvays Blue Rev (2022)",d:"Tyler, Clint, Taylor, Earl, AND Paul. 5 people — tied with Waxahatchee Saint Cloud (2020)."},

}

// ═══ NAVIGATION ═══
const TABS = [
  {id:'home',label:'Home',icon:'◉'},
  {id:'y2025',label:'2025',icon:'📅'},{id:'y2024',label:'2024',icon:'📅'},{id:'y2023',label:'2023',icon:'📅'},
  {id:'y2022',label:'2022',icon:'📅'},{id:'y2021',label:'2021',icon:'📅'},{id:'y2020',label:'2020',icon:'📅'},
  {id:'artists',label:'Artists',icon:'🎸'},
  {id:'people',label:'People',icon:'👥'},
  {id:'search',label:'Search',icon:'🔍'},
  {id:'stats',label:'Stats',icon:'📊'},
];
let activeTab = 'home';

function switchTab(tabId) {
  activeTab = tabId;
  document.querySelectorAll('nav button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabId);
  });
  const app = document.getElementById('app');
  let content = '';
  switch(tabId) {
    case 'home': content = renderHome(); break;
    case 'y2025': content = renderYear(2025); break;
    case 'y2024': content = renderYear(2024); break;
    case 'y2023': content = renderYear(2023); break;
    case 'y2022': content = renderYear(2022); break;
    case 'y2021': content = renderYear(2021); break;
    case 'y2020': content = renderYear(2020); break;
    case 'artists': content = renderArtists(); break;
    case 'people': content = renderPeople(); break;
    case 'search': content = renderSearch(); break;
    case 'stats': content = renderStats(); break;
  }
  app.innerHTML = `<div class="view active" style="padding:0 14px 20px">${content}</div>`;
  if (tabId === 'search') doSearch();
  setTimeout(loadCovers, 50);
  window.scrollTo(0, 0);
}

// Build nav
const nav = document.getElementById('nav');
TABS.forEach(tab => {
  const btn = document.createElement('button');
  btn.textContent = tab.icon + ' ' + tab.label;
  btn.dataset.tab = tab.id;
  btn.onclick = () => switchTab(tab.id);
  if (tab.id === 'home') btn.classList.add('active');
  nav.appendChild(btn);
});

switchTab('home');
